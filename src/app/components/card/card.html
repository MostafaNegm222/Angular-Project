<div class="col h-100" [ngStyle]="{
  'margin' : productDetails ? '0 auto' : ''
  }">
  <div class="card h-100" [ngClass]="{
    'd-flex' :productDetails ,
    'flex-row' : productDetails ,
    'justify-content-center' : productDetails
  }">
    <img [src]="product.image" [ngStyle]="{
    'width' : productDetails ? '50%' : 'auto'
  }" class="card-img-top object-fit-cover h-100" alt="...">
  <div class="card-body d-flex flex-column justify-content-center " [ngStyle]="{
    'width' : productDetails ? '50%' : 'auto'
  }">
    <div class="d-flex justify-content-between align-items-start">
      <h5 class="card-title">{{product.name | titlecase}}</h5>
      <p class="badge text-bg-success mt-1">{{product.price}}</p>
    </div>
    <p class="card-text">{{product.description}}</p>
    <div class="align-self-center">
      <ng-content></ng-content>
    </div>
  </div>
</div>
</div>
