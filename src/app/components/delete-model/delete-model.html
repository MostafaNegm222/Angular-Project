<ng-template #content let-c="close" let-d="dismiss">
	<div class="modal-header">
		<h4 class="modal-title text-danger" id="modal-basic-title">Delete Product</h4>
		<button type="button" class="btn-close" aria-label="Close" (click)="d('Cross click')"></button>
	</div>
	<div class="modal-body">
		<p>Are you sure to delete this product ??</p>
	</div>
	<div class="modal-footer">
		<button type="button" class="btn btn-danger" (click)="deleteProduct(product._id)">Delete</button>
	</div>
</ng-template>

<button class="btn  btn-danger" (click)="open(content)">Delete product</button>
