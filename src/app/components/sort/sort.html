<div class="p-3 shadow mb-4">
  <h2 class="text-center text-primary mb-3">Sort products</h2>
  <form>
    <div class="form-check mb-3">
      <input
        class="form-check-input"
        type="radio"
        name="sort"
        id="name"
        value="name"
        [(ngModel)]="sort"
        (ngModelChange)="changeSort()"
      />
      <label class="form-check-label" for="name">Name A to Z</label>
    </div>
    <div class="form-check mb-3">
      <input
        class="form-check-input"
        type="radio"
        name="sort"
        id="name"
        value="-name"
        [(ngModel)]="sort"
        (ngModelChange)="changeSort()"
      />
      <label class="form-check-label" for="name">Name Z to A</label>
    </div>
    <div class="form-check mb-3">
      <input
        class="form-check-input"
        type="radio"
        name="sort"
        id="price"
        value="price"
        [(ngModel)]="sort"
        (ngModelChange)="changeSort()"
      />
      <label class="form-check-label" for="price">Price (low to high)</label>
    </div>
    <div class="form-check mb-3">
      <input
        class="form-check-input"
        type="radio"
        name="sort"
        id="price"
        value="-price"
        [(ngModel)]="sort"
        (ngModelChange)="changeSort()"
      />
      <label class="form-check-label" for="price">Price (high to low)</label>
    </div>
  </form>
</div>
